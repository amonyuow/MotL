name: Build Game
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install pygame

      - name: Build with PyInstaller (Windows/Linux)
        if: runner.os != 'macOS'
        working-directory: MotI
        run: pyinstaller --onefile --add-data "assets;assets" --add-data "*.mp3;." --add-data "*.txt;." MotI.py

      - name: Build with PyInstaller (macOS)
        if: runner.os == 'macOS'
        working-directory: MotI
        run: pyinstaller --onefile --add-data "assets:assets" --add-data "*.mp3:." --add-data "*.txt:." MotI.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-${{ matrix.os }}
          path: MotI/dist/
